  <script>

      heroTitle: 'החוף המזרחי',
      heroSubtitle: 'קיץ 2026',

    document.documentElement.setAttribute('data-theme', 'modern');

</head>
<body>

  <div id="root"></div>

  <script type="text/babel" src="components/Stickers.jsx"></script>
  <script type="text/babel" src="components/Data.jsx"></script>
  <script type="text/babel" src="components/Hero.jsx"></script>
  <script type="text/babel" src="components/Sections.jsx"></script>
  <script type="text/babel" src="components/Vote.jsx"></script>

  <script type="text/babel">
    function Footer({ familyName }) {
      return (
        <footer style={{
          marginTop: 80,
          padding: '40px 0 20px',
          borderTop: '2px dashed var(--ink-faded)',
          textAlign: 'center',
          color: 'var(--ink-faded)',
        }}>
          <div className="handwritten" style={{ fontSize: 42, color: 'var(--ink-soft)', marginBottom: 8 }}>
            שיהיה טיול מדהים
          </div>
          <div className="label">{familyName}</div>
          <div style={{ marginTop: 18, fontSize: 13 }}>
            עשוי באהבה · הצבעות נשמרות אוטומטית במכשיר שלך
          </div>
        </footer>
      );
    }

    function App() {
      const familyName = window.__tweaks.familyName;
      return (
        <div className="page">
          <Hero />
          <FamilySection />
          <ExtendedFamilySection />
          <NJSection />
          <NYCSection />
          <VoteSection />
          <Footer familyName={familyName} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

</body>
</html>
